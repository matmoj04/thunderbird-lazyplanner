<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Planner</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  
  <div id="dashboardView" class="view-container">
    <div class="dashboard-header">
      <h1>My Semesters</h1>
      <button class="icon-btn" id="exportBtn" title="Export Data"><i class="nf">&#xf019;</i></button>
      <button class="icon-btn" id="importBtn" title="Import Data"><i class="nf">&#xf0b25;</i></button>
      <input type="file" id="importFile" style="display:none" accept=".json">

      <button class="icon-btn" id="editDashBtn"><i class="nf">&#xf013;</i> Edit</button>
    </div>
    <div id="semesterGrid" class="semester-grid"></div>
  </div>

  <div id="plannerView" class="view-container hidden">
    <div class="toolbar">
      <div class="nav-group">
        <button class="icon-btn" id="backToDash"><i class="nf">&#xf060;</i></button>
        <div class="tab-container" id="tabBar"></div>
        <button class="icon-btn" id="newFolder" title="Add Folder"><i class="nf">&#xf067;</i></button>
      </div>
      
      <div class="date-settings">
          <span id="activeSemesterTitle"></span>
          <span class="date-label">Start date:</span>
          <input type="date" id="startDatePicker">
          <button class="icon-btn" id="editPlannerBtn"><i class="nf">&#xf013;</i> Edit</button>
      </div>
    </div>

    <div id="tablesContainer"></div>
  </div>

  <script src="main.js"></script>
  <script src="script.js"></script>

</body>
</html>
