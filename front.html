<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LazyPlanner</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  
  <div id="dashboardView" class="view-container">
    <header class="dashboard-header">
      <h1>My Semesters</h1>
      <div class="header-controls">
        <button class="icon-btn" id="exportBtn" title="Export Data"><icon class="nf">&#xf019;</icon></button>
        <button class="icon-btn" id="importBtn" title="Import Data"><icon class="nf">&#xf0b25;</icon></button>
        <input type="file" id="importFile" style="display:none" accept=".json">
        <button class="icon-btn" id="editDashBtn"><icon class="nf">&#xf013;</icon> Edit</button>
      </div>
    </header>
    <div id="semesterGrid" class="semester-grid"></div>
  </div>

  <div id="plannerView" class="view-container hidden">
    <header class="toolbar">
      <div class="nav-group">
        <button class="icon-btn" id="backToDash"><icon class="nf">&#xf060;</icon></button>
        <div class="tab-container" id="tabBar"></div>
        <button class="icon-btn" id="newFolder" title="Add Folder"><icon class="nf">&#xf067;</icon></button>
      </div>
      
      <div class="date-settings">
          <span id="activeSemesterTitle"></span>
          <span class="date-label">Start date:</span>
          <input type="date" id="startDatePicker">
          <button class="icon-btn" id="editPlannerBtn"><icon class="nf">&#xf013;</icon> Edit</button>
      </div>
    </header>

    <div id="tablesContainer"></div>

    <footer class="legend-container">
        <div id="legendToggle" class="legend-header"><icon class="nf">&#xf129;</icon> Icon Meanings</div>
        <div id="legendContent" class="legend-content hidden">
            <div class="legend-item"><span class="icon-empty">󰄱</span> To be done / Planned</div>
            <div class="legend-item"><span class="icon-check">󰄵</span> Completed</div>
            <div class="legend-item"><span class="icon-close">󰅘</span> Missed / Cancelled</div>
            <div class="legend-item"><span class="icon-notes">󰤌</span> Check again / later</div>
            <div class="legend-item"><span class="icon-homew">󰄮</span> Homework / Assignment</div>
        </div>
    </footer>
  </div>

  <script src="main.js"></script>
  <script src="script.js"></script>

</body>
</html>
